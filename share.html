<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Project - NeuroLink</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Permanent+Marker&family=Patrick+Hand&family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="paper-texture">
    <header>
        <div style="display:flex; flex-direction:column;">
            <div style="font-size: 0.8rem; color: #777; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Shared Project</div>
            <div style="font-weight: 800; font-size: 1.5rem;" id="project-title-header">Loading...</div>
        </div>
        <nav id="nav-links">
            <a href="/" class="auth-btn">Join NeuroLink</a>
        </nav>
    </header>

    <main class="container">
        <div class="header-controls">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('notebook')">📓 Notebook</button>
                <button class="tab-btn" onclick="switchTab('mindmap')">🗺️ Mind Map</button>
                <button class="tab-btn" onclick="switchTab('flashcards')">🃏 Flashcards</button>
                <button class="tab-btn" onclick="switchTab('slides')">📊 Slides</button>
                <button class="tab-btn" onclick="switchTab('infographic')">🖼️ Infographic</button>
                <button class="tab-btn" onclick="switchTab('quiz')">🎯 Quiz</button>
            </div>
            <div>
                <button class="export-btn" onclick="exportCurrentTab()">⬇ Download PDF</button>
            </div>
        </div>

        <div class="viewer-container">
            <div id="notebook-view">
                 <div class="notebook-inner-layout">
                     <aside class="notebook-sidebar">
                         <h1 id="notebook-sidebar-title">STUDY NOTES</h1>
                         <nav id="notebook-toc"></nav>
                     </aside>
                     <main id="notebook-content-area" class="notebook-main"></main>
                 </div>
            </div>
            <div id="mindmap-view" class="hidden"><div id="tree-root"></div></div>
            <div id="flashcards-view" class="hidden">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px;">
                    <div id="flashcard-container"></div>
                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button class="auth-btn" onclick="prevCard()">← Back</button>
                        <button class="auth-btn" id="flip-btn" onclick="flipCard()">Flip (Space)</button>
                        <button class="auth-btn" onclick="nextCard()">Next →</button>
                    </div>
                </div>
            </div>
            <div id="slides-view" class="hidden">
                <div id="slides-container"></div>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="auth-btn" onclick="prevSlide()">← Previous</button>
                    <button class="auth-btn" onclick="nextSlide()">Next →</button>
                </div>
            </div>
            <div id="infographic-view" class="hidden"><div id="infographic-container"></div></div>
            <div id="quiz-view" class="hidden"><div id="quiz-container" class="quiz-container"></div></div>
        </div>
    </main>

    <script src="js/mindmap.js"></script>
    <script src="js/flashcards.js"></script>
    <script src="js/slides.js"></script>
    <script src="js/infographic.js"></script>
    <script src="js/quiz.js?v=1.2"></script>
    <script>
        let currentProject = null;
        let activeTab = 'notebook';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            try {
                const res = await fetch(`/api/public/projects/${id}`);
                if (res.ok) {
                    currentProject = await res.json();
                    
                    // Naming Logic: Fallback for Legacy Projects
                    const projectName = currentProject.title || currentProject.projectName || currentProject.topic || 'Shared Project';
                    document.getElementById('project-title-header').innerText = projectName;
                    document.title = `${projectName} - NeuroLink`;
                    
                    // Smart Material Detection: Find first available material
                    const priority = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic', 'quiz'];
                    let defaultTab = priority.find(type => 
                        currentProject.outputs && currentProject.outputs.some(o => o.type === type && o.content)
                    ) || 'notebook';

                    switchTab(defaultTab);
                }
            } catch (error) { console.error(error); }
        }

        function switchTab(type) {
            activeTab = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.tab-btn[onclick="switchTab('${type}')"]`);
            if (activeBtn) activeBtn.classList.add('active');

            const views = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic', 'quiz'];
            views.forEach(v => {
                const el = document.getElementById(`${v}-view`);
                if (el) el.classList.add('hidden');
            });
            const activeView = document.getElementById(`${type}-view`);
            if (activeView) activeView.classList.remove('hidden');
            
            renderContent(type);
        }

        function renderContent(type) {
            if (!currentProject) return;
            const output = currentProject.outputs && currentProject.outputs.find(o => o.type === type);
            const legacyContent = currentProject[type];
            
                if (!content || (typeof content === 'string' && content.length < 5)) {
                    showEmptyState(type);
                    return;
                }

                const data = ensureJSON(content);

                if (type === 'notebook') {
                    renderNotebook(data);
                } else {
                    // Isolation Layer: Prevents one malformed legacy visualizer from blocking the UI
                    try {
                        if (type === 'mindmap') initMindMap(data);
                        else if (type === 'flashcards') initFlashcards(data);
                        else if (type === 'slides') initSlides(data);
                        else if (type === 'infographic') initInfographic(data);
                        else if (type === 'quiz') initQuiz(data);
                    } catch (isolationErr) {
                        console.error(`[Share Isolated Error] ${type}:`, isolationErr);
                    }
                }
            } catch (err) {
                console.error(`[Share Renderer] Failed for ${type}:`, err);
            }
        }

        function showEmptyState(type) {
            const icons = {
                notebook: '📓',
                mindmap: '🧠',
                flashcards: '🃏',
                slides: '📊',
                infographic: '🖼️',
                quiz: '📝'
            };
            const icon = icons[type] || '✨';
            const name = type.charAt(0).toUpperCase() + type.slice(1);
            
            const html = `
                <div class="empty-state-card premium-shadow" style="padding: 4rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">${icon}</div>
                    <h3 style="font-family: 'Permanent Marker'; color: var(--accent-color); font-size: 1.8rem;">${name} not shared yet</h3>
                    <p style="font-family: 'Patrick Hand'; font-size: 1.2rem;">The owner of this project hasn't generated this material yet.</p>
                </div>
            `;

            if (type === 'notebook') {
                document.getElementById('notebook-view').innerHTML = html;
            } else {
                const el = document.getElementById(`${type}-view`);
                if (el) el.innerHTML = html;
            }
        }

        function ensureJSON(data) {
            if (!data) return null;
            if (typeof data === 'object') return data;
            
            if (typeof data === 'string') {
                const trimmed = data.trim();
                try {
                    // 1. Standard JSON check
                    if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
                        return JSON.parse(trimmed);
                    }
                    
                    // 2. Legacy Check: Markdown-wrapped JSON (common in early AI outputs)
                    const jsonMatch = trimmed.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
                    if (jsonMatch && jsonMatch[1]) {
                        return JSON.parse(jsonMatch[1].trim());
                    }
                } catch (e) {
                    console.warn('[SafeParse] JSON parse failed, returning raw string');
                }
            }
            return data;
        }

        function renderNotebook(content) {
            const contentArea = document.getElementById('notebook-content-area');
            const toc = document.getElementById('notebook-toc');
            contentArea.innerHTML = content;
            toc.innerHTML = '';
            
            const chapters = contentArea.querySelectorAll('section.notebook-page');
            chapters.forEach((ch, i) => {
                const title = ch.querySelector('h2')?.innerText;
                if (!title) return;
                const link = document.createElement('a');
                link.className = 'toc-link';
                link.innerText = title;
                link.onclick = () => ch.scrollIntoView({behavior:'smooth'});
                toc.appendChild(link);
            });

            if (chapters.length === 0 && typeof content === 'string' && content.trim()) {
                const link = document.createElement('a');
                link.className = 'toc-link';
                link.innerText = 'Content';
                toc.appendChild(link);
            }
        }

        function exportCurrentTab() {
            const element = {
                notebook: 'notebook-content-area',
                mindmap: 'tree-root',
                flashcards: 'flashcard-container',
                slides: 'slides-container',
                infographic: 'infographic-container',
                quiz: 'quiz-container'
            }[activeTab];
            html2pdf().from(document.getElementById(element)).save(`${currentProject.title}_${activeTab}.pdf`);
        }

        init();
    </script>
</body>
</html>
