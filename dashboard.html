<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NeuroLink</title>
    <meta name="description" content="Manage your AI-generated study projects. Create, view, and export notebooks, mind maps, flashcards, slides, and infographics.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
        }

        .new-project-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        /* Input mode toggle */
        .input-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .input-tab {
            flex: 1;
            padding: 0.5rem;
            border: 2px solid var(--dot-color);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: #888;
            transition: all 0.2s;
        }

        .input-tab.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(230, 126, 34, 0.07);
        }

        /* File drop zone */
        .file-drop-zone {
            border: 2px dashed var(--line-color);
            border-radius: 10px;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0,0,0,0.02);
            font-size: 0.9rem;
            color: #777;
        }

        .file-drop-zone:hover,
        .file-drop-zone.drag-over {
            border-color: var(--accent-color);
            background: rgba(230, 126, 34, 0.05);
            color: var(--accent-color);
        }

        .file-drop-zone .drop-icon { font-size: 2rem; display: block; margin-bottom: 0.4rem; }

        .file-selected-name {
            font-size: 0.82rem;
            color: #2ecc71;
            font-weight: 600;
            margin-top: 0.4rem;
            min-height: 1.2em;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; font-size: 1.5rem;"><span style="color: var(--accent-color);">Neuro</span>Link</div>
        <nav id="nav-links">
            <span id="user-name">Loading...</span>
            <a href="/auth/logout" class="auth-btn">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>My Projects</h1>
            <button class="new-project-btn" onclick="showModal()">+ New Project</button>
        </div>

        <div id="projects-list" class="projects-grid">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
    </main>

    <!-- New Project Modal -->
    <div id="new-project-modal" class="modal">
        <div class="card" style="width: 440px; max-height: 90vh; overflow-y: auto;">
            <h2>Create New Project</h2>
            <form id="new-project-form">

                <!-- Title -->
                <div style="margin-bottom: 1rem;">
                    <label style="font-weight:700; font-size:0.9rem;">Project Title</label><br>
                    <input type="text" id="title" required style="width:100%; padding:0.5rem; border-radius:4px; border:1px solid #ddd; margin-top:0.3rem;">
                </div>

                <!-- Input mode toggle -->
                <div style="margin-bottom: 0.5rem;">
                    <label style="font-weight:700; font-size:0.9rem;">Content Source</label>
                </div>
                <div class="input-toggle">
                    <button type="button" class="input-tab active" id="tab-text" onclick="setInputMode('text')">✏️ Paste Text</button>
                    <button type="button" class="input-tab" id="tab-file" onclick="setInputMode('file')">📎 Upload File</button>
                </div>

                <!-- Text input -->
                <div id="mode-text" style="margin-bottom:1rem;">
                    <textarea id="content" rows="4"
                        style="width:100%; padding:0.5rem; border-radius:4px; border:1px solid #ddd; resize:vertical;"
                        placeholder="Paste your lecture notes, textbook excerpt, or any academic content here…"></textarea>
                </div>

                <!-- File input -->
                <div id="mode-file" class="hidden" style="margin-bottom:1rem;">
                    <div class="file-drop-zone" id="drop-zone" onclick="document.getElementById('file-upload').click()">
                        <span class="drop-icon">📄</span>
                        Drag &amp; drop a <strong>.txt</strong> or <strong>.pdf</strong> file here,<br>or <u>click to browse</u>
                        <input type="file" id="file-upload" accept=".txt,.pdf" multiple
                            style="display:none" onchange="onFileSelected(this)">
                    </div>
                    <div class="file-selected-name" id="file-name"></div>
                </div>

                <!-- Material selection -->
                <div class="selection-title-row">
                    <label style="font-weight:700; font-size:0.9rem;">Study Materials to Generate</label>
                    <button type="button" class="select-all-btn" id="toggle-all">Deselect All</button>
                </div>
                <div class="selection-group" id="material-selection">
                    <label class="selection-item"><input type="checkbox" name="material" value="notebook" checked> 📓 Notebook</label>
                    <label class="selection-item"><input type="checkbox" name="material" value="mindmap" checked> 🗺️ Mind Map</label>
                    <label class="selection-item"><input type="checkbox" name="material" value="flashcards" checked> 🃏 Flashcards</label>
                    <label class="selection-item"><input type="checkbox" name="material" value="slides" checked> 📊 Slides</label>
                    <label class="selection-item"><input type="checkbox" name="material" value="infographic" checked> 🖼️ Infographic</label>
                </div>

                <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:0.5rem;">
                    <button type="button" onclick="hideModal()" style="background:none; border:none; cursor:pointer; color:#888;">Cancel</button>
                    <button type="submit" class="auth-btn" id="submit-btn">Create &amp; Generate</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // ── Input mode ───────────────────────────────────────────────────────
        let activeMode = 'text';

        function setInputMode(mode) {
            activeMode = mode;
            document.getElementById('mode-text').classList.toggle('hidden', mode !== 'text');
            document.getElementById('mode-file').classList.toggle('hidden', mode !== 'file');
            document.getElementById('tab-text').classList.toggle('active', mode === 'text');
            document.getElementById('tab-file').classList.toggle('active', mode === 'file');
        }

        function onFileSelected(input) {
            const files = input.files;
            if (!files || files.length === 0) {
                document.getElementById('file-name').textContent = '';
            } else if (files.length === 1) {
                document.getElementById('file-name').textContent = `✅ ${files[0].name}`;
            } else {
                document.getElementById('file-name').textContent = `✅ ${files.length} files selected`;
            }
        }

        // Drag-and-drop support
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                const dt = new DataTransfer();
                let validCount = 0;
                for (let i = 0; i < files.length; i++) {
                    const f = files[i];
                    if (f.name.endsWith('.txt') || f.name.endsWith('.pdf')) {
                        dt.items.add(f);
                        validCount++;
                    }
                }
                document.getElementById('file-upload').files = dt.files;
                onFileSelected(document.getElementById('file-upload'));
                if (validCount < files.length) {
                    alert('Some files were skipped. Only .txt and .pdf are supported.');
                }
            }
        });

        // ── Select All toggle ─────────────────────────────────────────────────
        const toggleBtn = document.getElementById('toggle-all');
        const getCheckboxes = () => document.querySelectorAll('input[name="material"]');

        toggleBtn.onclick = () => {
            const checks = getCheckboxes();
            const anyUnchecked = Array.from(checks).some(c => !c.checked);
            checks.forEach(c => c.checked = anyUnchecked);
            toggleBtn.innerText = anyUnchecked ? 'Deselect All' : 'Select All';
        };

        document.getElementById('material-selection').onchange = () => {
            const checks = getCheckboxes();
            const allChecked = Array.from(checks).every(c => c.checked);
            toggleBtn.innerText = allChecked ? 'Deselect All' : 'Select All';
        };

        // ── Form submission ───────────────────────────────────────────────────
        document.getElementById('new-project-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');

            const title = document.getElementById('title').value.trim();
            const selectedTypes = Array.from(document.querySelectorAll('input[name="material"]:checked')).map(c => c.value);

            if (!title) { alert('Please enter a project title.'); return; }
            if (selectedTypes.length === 0) { alert('Please select at least one study material to generate.'); return; }

            // Build FormData (works for both text and file)
            const formData = new FormData();
            formData.append('title', title);
            formData.append('selectedTypes', JSON.stringify(selectedTypes));

            if (activeMode === 'file') {
                const fileInput = document.getElementById('file-upload');
                if (!fileInput.files.length) { alert('Please select at least one file to upload.'); return; }
                for (let i = 0; i < fileInput.files.length; i++) {
                    formData.append('files', fileInput.files[i]);
                }
            } else {
                const content = document.getElementById('content').value.trim();
                if (!content) { alert('Please paste some content.'); return; }
                formData.append('content', content);
            }

            const originalText = btn.innerText;
            btn.innerText = `Generating ${selectedTypes.length} material${selectedTypes.length > 1 ? 's' : ''}… 🧠`;
            btn.disabled = true;

            try {
                const res = await fetch('/api/projects', { method: 'POST', body: formData });
                if (res.ok) {
                    const project = await res.json();
                    window.location.href = `/project.html?id=${project._id}`;
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert(err.error || 'Generation failed. Please try again.');
                }
            } catch {
                alert('Connection error. Is the server running?');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        function showModal() { document.getElementById('new-project-modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('new-project-modal').style.display = 'none'; }
    </script>
</body>
</html>
