<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project View - Academic Skills System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Permanent+Marker&family=Patrick+Hand&family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--dot-color);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #777;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: var(--ink-color);
            color: white;
        }

        .viewer-container {
            min-height: 600px;
            position: relative;
        }

        .hidden { display: none !important; }

        /* Shared Component Styles (Injecting from Examples) */
        #flashcard-view, #mindmap-view, #notebook-view, #slides-view, #infographic-view {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; font-size: 1.5rem;" id="project-title-header">Project</div>
        <nav id="nav-links">
            <a href="/dashboard.html" style="margin-right: 1rem; text-decoration: none; color: var(--ink-color); font-weight: 600;">Dashboard</a>
            <a href="/auth/logout" class="auth-btn">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('notebook')">Notebook</button>
            <button class="tab-btn" onclick="switchTab('mindmap')">Mind Map</button>
            <button class="tab-btn" onclick="switchTab('flashcards')">Flashcards</button>
            <button class="tab-btn" onclick="switchTab('slides')">Slides</button>
            <button class="tab-btn" onclick="switchTab('infographic')">Infographic</button>
        </div>

            <div id="notebook-view" class="hidden">
                 <div class="notebook-inner-layout">
                     <aside class="notebook-sidebar">
                         <h1 id="notebook-sidebar-title">STUDY NOTES</h1>
                         <nav id="notebook-toc"></nav>
                     </aside>
                     <main id="notebook-content-area" class="notebook-main">
                         Loading notebook content...
                     </main>
                 </div>
            </div>
            
            <div id="mindmap-view" class="hidden">
                 <!-- Mindmap specific container from example -->
                 <div id="tree-root" style="display: flex; justify-content: flex-start; align-items: center; min-width: max-content;"></div>
            </div>

            <div id="flashcards-view" class="hidden">
                <!-- Flashcard specific container from example -->
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 500px;">
                    <div id="flashcard-container"></div>
                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button class="auth-btn" onclick="prevCard()">← Back</button>
                        <button class="auth-btn" id="flip-btn">Flip (Space)</button>
                        <button class="auth-btn" onclick="nextCard()">Next →</button>
                    </div>
                </div>
            </div>

            <div id="slides-view" class="hidden">
                <div id="slides-container"></div>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="auth-btn" onclick="prevSlide()">← Previous</button>
                    <button class="auth-btn" onclick="nextSlide()">Next →</button>
                </div>
            </div>

            <div id="infographic-view" class="hidden">
                <div id="infographic-container"></div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/mindmap.js"></script>
    <script src="js/flashcards.js"></script>
    <script src="js/slides.js"></script>
    <script src="js/infographic.js"></script>
    <script>
        let currentProject = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            try {
                const res = await fetch(`/api/projects/${id}`);
                if (res.ok) {
                    currentProject = await res.json();
                    document.getElementById('project-title-header').innerText = currentProject.title;
                    switchTab('notebook');
                } else {
                    document.getElementById('project-title-header').innerText = "Project Not Found (404)";
                    console.error("Failed to fetch project");
                }
            } catch (error) {
                console.error("Error fetching project:", error);
                document.getElementById('project-title-header').innerText = "Connection Error";
            }
        }

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.tab-btn[onclick="switchTab('${type}')"]`);
            if (activeBtn) activeBtn.classList.add('active');

            const views = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic'];
            views.forEach(v => {
                document.getElementById(`${v}-view`).classList.add('hidden');
            });
            document.getElementById(`${type}-view`).classList.remove('hidden');
            
            renderContent(type);
        }

        function renderContent(type) {
            if (!currentProject) {
                document.getElementById(`${type}-view`).innerHTML = `<div class="card">Project data not loaded.</div>`;
                return;
            }
            const output = currentProject.outputs.find(o => o.type === type);
            if (!output) {
                document.getElementById(`${type}-view`).innerHTML = `<div class="card">No ${type} generated yet. Make sure to trigger AI generation.</div>`;
                return;
            }

            if (type === 'notebook') {
                const contentArea = document.getElementById('notebook-content-area');
                const toc = document.getElementById('notebook-toc');
                const sidebarTitle = document.getElementById('notebook-sidebar-title');
                
                sidebarTitle.innerText = (currentProject.title || 'STUDY NOTES').toUpperCase();
                contentArea.innerHTML = output.content;
                toc.innerHTML = '';

                // Build Table of Contents per Example Template
                // AI wraps chapters in <section class="notebook-page ruled">
                const chapters = contentArea.querySelectorAll('section.notebook-page');
                
                chapters.forEach((chapter, index) => {
                    const chTitleEl = chapter.querySelector('h2');
                    if (!chTitleEl) return;

                    const chId = `chapter-${index}`;
                    chapter.id = chId;

                    // Create TOC Group
                    const group = document.createElement('div');
                    group.className = 'toc-group';

                    const groupTitle = document.createElement('div');
                    groupTitle.className = 'toc-title';
                    groupTitle.innerText = chTitleEl.innerText;
                    group.appendChild(groupTitle);

                    // Create sub-links for sections inside this chapter
                    const subSections = chapter.querySelectorAll('div.notebook-section');
                    subSections.forEach((sub, subIdx) => {
                        const subTitleEl = sub.querySelector('h3');
                        if (!subTitleEl) return;

                        const subId = `${chId}-sub-${subIdx}`;
                        sub.id = subId;

                        const link = document.createElement('a');
                        link.className = 'toc-link';
                        link.innerText = subTitleEl.innerText;
                        link.onclick = (e) => {
                            e.preventDefault();
                            document.getElementById(subId).scrollIntoView({ behavior: 'smooth' });
                            document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
                            link.classList.add('active');
                        };
                        group.appendChild(link);
                    });

                    toc.appendChild(group);
                });
            } else if (type === 'mindmap') {
                initMindMap(output.content);
            } else if (type === 'flashcards') {
                initFlashcards(output.content);
            } else if (type === 'slides') {
                initSlides(output.content);
            } else if (type === 'infographic') {
                initInfographic(output.content);
            }
        }

        init();
    </script>
</body>
</html>
