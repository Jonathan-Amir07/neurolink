<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLink - Study Project</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Patrick+Hand&family=Permanent+Marker&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header>
        <div class="breadcrumb">
            <a href="dashboard.html" class="brand" style="font-weight: 800; font-size: 1.25rem; color: var(--accent-color); letter-spacing: -0.5px; text-decoration:none;">NeuroLink</a>
            <span class="sep">/</span>
            <span class="current" id="breadcrumb-project" style="font-weight: 400; opacity: 0.6;">IMPERIAL ARCHIVE</span>
        </div>
        
        <nav id="nav-links">
            <!-- PROJECT PULSE HUD (Luxury Status Capsule) -->
            <div class="project-pulse-hud">
                <div class="hud-item">
                    <div class="ai-pulse-indicator"></div>
                    <span id="ai-status-text" style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.65rem; font-weight: 800; opacity: 0.9;">System Online</span>
                </div>
                <div class="hud-item" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 12px;">
                    <span id="gen-count" style="font-size: 0.7rem; font-weight: 800; color: var(--accent-color);">0/6</span>
                    <div id="gen-progress-container" style="width: 60px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 0 0.5rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                        <div id="gen-progress" style="width: 0%; height: 100%; background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);"></div>
                    </div>
                </div>
                <button class="hud-regen-btn" onclick="regenerateCurrentTab()" title="Re-sync current view">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>

            <div class="user-menu" style="gap: 1.5rem;">
                <!-- THEME SELECTOR PILL (Luxury Capsule) -->
                <div class="theme-selector-pill">
                    <button onclick="setTheme('parchment')" title="Parchment Mode" class="theme-pill-btn parchment-btn">📜</button>
                    <button onclick="setTheme('library')" title="Midnight Library" class="theme-pill-btn library-btn">🌙</button>
                    <button onclick="setTheme('lab')" title="Sterile Lab" class="theme-pill-btn lab-btn">🧪</button>
                    <button onclick="setTheme('default')" title="Standard Studio" class="theme-pill-btn studio-btn">🏙️</button>
                </div>

                <div style="display: flex; align-items: center; gap: 12px;">
                    <a href="/auth/logout" style="font-size: 0.75rem; font-weight: 700; color: white; opacity: 0.3; text-decoration: none; text-transform: uppercase;">Sign Out</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- SEGMENTED WORKSPACE TRACK (Luxury UX) -->
        <div class="workspace-tabs">
            <button class="nav-pill tab-notebook active" onclick="switchTab('notebook')">
                <i class="fas fa-book-open"></i> Notebook
            </button>
            <button class="nav-pill tab-mindmap" onclick="switchTab('mindmap')">
                <i class="fas fa-project-diagram"></i> Mind Map
            </button>
            <button class="nav-pill tab-flashcards" onclick="switchTab('flashcards')">
                <i class="fas fa-layer-group"></i> Flashcards
            </button>
            <button class="nav-pill tab-slides" onclick="switchTab('slides')">
                <i class="fas fa-presentation-screen"></i> Slides
            </button>
            <button class="nav-pill tab-infographic" onclick="switchTab('infographic')">
                <i class="fas fa-chart-line"></i> Visual Arc
            </button>
            <button class="nav-pill tab-quiz" onclick="switchTab('quiz')">
                <i class="fas fa-vial"></i> Quiz Lab
            </button>
        </div>

        <div class="card premium-shadow" id="studio-frame" style="position: relative; padding: 0; min-height: 85vh; overflow: hidden; background: none; border: none;">
            <div class="viewer-container">
                <div id="loading-overlay" class="loading-overlay hidden">
                    <div class="ai-brain-anim">
                        <div class="brain-pulse"></div>
                        <i class="fas fa-brain"></i>
                    </div>
                    <p id="loading-text" style="font-family: 'Permanent Marker'; font-size: 1.5rem; color: var(--accent-color); letter-spacing: 2px;">SYNCING ARCHIVES...</p>
                    <div class="loading-bar-mini"><div class="loading-bar-fill"></div></div>
                </div>

                <div id="notebook-view" class="tab-view">
                    <div class="notebook-inner-layout" id="notebook-layout">
                        <aside class="notebook-sidebar">
                            <div class="sidebar-toggle" onclick="toggleSidebar()">
                                <i class="fas fa-chevron-left" id="toggle-icon"></i>
                            </div>
                            <div class="sidebar-gloss"></div>
                            <h1>STUDY INDEX</h1>
                            <div class="toc-search">
                                <i class="fas fa-search"></i>
                                <input type="text" placeholder="Find in notes..." onkeyup="filterTOC(this.value)">
                            </div>
                            <nav id="notebook-toc"></nav>
                        </aside>
                        <main id="notebook-content-area" class="notebook-main">
                            <!-- Content -->
                        </main>
                    </div>
                </div>

                <div id="mindmap-view" class="tab-view hidden"><div id="tree-root"></div></div>
                <div id="flashcards-view" class="tab-view hidden">
                    <div class="study-card-view">
                        <div class="flashcard-progress-bar"><div id="flash-progress" class="flashcard-progress-fill"></div></div>
                        <div class="flashcard-counter" id="card-counter">1 / 10</div>
                        <div id="flashcard-container"></div>
                        <div class="card-controls">
                            <button class="nav-control-btn prev" onclick="prevCard()"><i class="fas fa-chevron-left"></i></button>
                            <button class="flip-action-btn" id="flip-btn" onclick="flipCard()">
                                <span class="btn-scan"></span>
                                <i class="fas fa-redo"></i> REVEAL
                            </button>
                            <button class="nav-control-btn next" onclick="nextCard()"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                </div>
                <div id="slides-view" class="tab-view hidden"><div id="slides-container"></div></div>
                <div id="infographic-view" class="tab-view hidden"><div id="infographic-container"></div></div>
                <div id="quiz-view" class="tab-view hidden"><div id="quiz-container"></div></div>
            </div>
        </div>
    </main>

    <script>
        let currentProject = null;
        let activeTab = 'notebook';
        let sidebarCollapsed = false;

        async function loadProject() {
            showLoading("ACCESING ARCHIVES...");
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            if (!projectId) { window.location.href = 'dashboard.html'; return; }

            try {
                const res = await fetch(`/api/projects/${projectId}`);
                if (!res.ok) {
                    console.error('Failed to load project:', res.status);
                    window.location.href = 'dashboard.html';
                    return;
                }
                const project = await res.json();
                if (project && project._id) {
                    currentProject = project;
                    document.getElementById('ai-status-text').innerText = "System Synced";
                    document.getElementById('breadcrumb-project').innerText = project.title || "STUDY WORKSPACE";
                    
                    const priority = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic', 'quiz'];
                    const hasMaterial = (type) => {
                        if (!currentProject.outputs) return false;
                        const o = currentProject.outputs.find(out => out.type === type);
                        return (o && o.content && o.content.length > 5);
                    };

                    const count = priority.filter(hasMaterial).length;
                    document.getElementById('gen-progress').style.width = `${(count / 6) * 100}%`;
                    document.getElementById('gen-count').innerText = `${count}/6`;

                    // If we just loaded, or the current active doesn't have content, find the best tab
                    if (!hasMaterial(activeTab)) {
                        const firstAvailable = priority.find(hasMaterial) || 'notebook';
                        switchTab(firstAvailable);
                    } else {
                        renderContent(activeTab);
                    }
                    hideLoading();
                } else {
                    console.warn('Project not found or invalid data structure');
                    window.location.href = 'dashboard.html';
                }
            } catch (error) { 
                console.error('Load Error:', error); 
                document.getElementById('ai-status-text').innerText = "Sync Error";
                hideLoading(); 
            }
        }

        function switchTab(type) {
            activeTab = type;
            document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.tab-${type}`);
            if (activeBtn) activeBtn.classList.add('active');

            const views = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic', 'quiz'];
            views.forEach(v => document.getElementById(`${v}-view`).classList.add('hidden'));
            document.getElementById(`${type}-view`).classList.remove('hidden');
            
            renderContent(type);
        }


        function renderContent(type) {
            if (!currentProject) return;
            const output = currentProject.outputs && currentProject.outputs.find(o => o.type === type);
            const content = (output && output.content) || currentProject[type];
            
            if (!content || content.length < 5) { showEmptyState(type); return; }

            if (type === 'notebook') renderNotebook(content);
            else {
                const data = ensureJSON(content);
                if (type === 'mindmap' && window.initMindMap) initMindMap(data);
                else if (type === 'flashcards' && window.initFlashcards) initFlashcards(data);
                else if (type === 'slides' && window.initSlides) initSlides(data);
                else if (type === 'infographic' && window.initInfographic) initInfographic(data);
                else if (type === 'quiz' && window.initQuiz) initQuiz(data);
            }
        }

        function renderNotebook(content) {
            const area = document.getElementById('notebook-content-area');
            const toc = document.getElementById('notebook-toc');
            area.innerHTML = content;
            toc.innerHTML = '';
            
            const headings = area.querySelectorAll('h2');
            if (headings.length === 0) {
                toc.innerHTML = '<p style="opacity:0.3; font-size:0.8rem; text-align:center; padding-top:2rem;">No chapters found</p>';
                return;
            }

            headings.forEach((h2, i) => {
                const id = `ch-${i}`; h2.id = id;
                const group = document.createElement('div');
                group.className = 'toc-group';
                group.innerHTML = `<span class="toc-title">${h2.innerText}</span>`;
                
                let next = h2.nextElementSibling;
                while(next && next.tagName !== 'H2') {
                    if (next.tagName === 'H3') {
                        const subId = `s-${Math.random().toString(36).substr(2,5)}`;
                        next.id = subId;
                        const link = document.createElement('a');
                        link.className = 'toc-link';
                        link.innerText = next.innerText;
                        link.onclick = (e) => {
                            e.preventDefault();
                            document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
                            link.classList.add('active');
                            document.getElementById(subId).scrollIntoView({ behavior: 'smooth' });
                        };
                        group.appendChild(link);
                    }
                    next = next.nextElementSibling;
                }
                toc.appendChild(group);
            });
        }

        function filterTOC(query) {
            const links = document.querySelectorAll('.toc-link');
            const groups = document.querySelectorAll('.toc-group');
            query = query.toLowerCase();
            
            links.forEach(link => {
                const visible = link.innerText.toLowerCase().includes(query);
                link.style.display = visible ? 'block' : 'none';
            });

            groups.forEach(group => {
                const hasVisibleLinks = Array.from(group.querySelectorAll('.toc-link')).some(l => l.style.display !== 'none');
                const titleMatch = group.querySelector('.toc-title').innerText.toLowerCase().includes(query);
                group.style.display = (hasVisibleLinks || titleMatch) ? 'block' : 'none';
            });
        }

        function ensureJSON(data) {
            if (typeof data === 'object') return data;
            try { return JSON.parse(data); } catch (e) {
                const match = data.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
                return match ? JSON.parse(match[1]) : data;
            }
        }

        function showEmptyState(type) {
            const containerId = type === 'notebook' ? 'notebook-content-area' : {
                mindmap: 'tree-root', flashcards: 'flashcard-container',
                slides: 'slides-container', infographic: 'infographic-container',
                quiz: 'quiz-container'
            }[type];
            const el = document.getElementById(containerId);
            if (el) el.innerHTML = `<div class="empty-state-card" style="padding:4rem; text-align:center;">
                <h3 style="font-family:'Permanent Marker'; font-size:2rem; color:var(--accent-color);">Missing Material</h3>
                <p>AI can generate this ${type} for you in seconds.</p>
                <button class="auth-btn" style="margin-top:2rem; background:var(--accent-color); padding:1rem 2rem;" onclick="regenerateCurrentTab()">Generate Now</button>
            </div>`;
        }

        function showLoading(text) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').innerText = text;
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        function setTheme(theme) {
            if (theme === 'default') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('neurolink-theme', theme);
            document.querySelectorAll('.theme-pill-btn').forEach(btn => btn.classList.remove('active-parchment', 'active-library', 'active-lab', 'active-default'));
            const themeMap = { 'parchment': 'parchment-btn', 'library': 'library-btn', 'lab': 'lab-btn', 'default': 'studio-btn' };
            const activeBtn = document.querySelector(`.${themeMap[theme] || 'studio-btn'}`);
            if (activeBtn) activeBtn.classList.add(`active-${theme}`);
        }

        async function regenerateCurrentTab() {
            if (!confirm(`Regenerate ${activeTab}?`)) return;
            const statusText = document.getElementById('ai-status-text');
            statusText.innerText = `AI GENERATING ${activeTab.toUpperCase()}...`;
            statusText.style.color = "var(--accent-color)";
            
            showLoading(`AI IS CREATING ${activeTab.toUpperCase()}...`);
            try {
                const res = await fetch(`/api/projects/${currentProject._id}/regenerate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: activeTab })
                });
                const data = await res.json();
                if (data.success) {
                    await loadProject();
                    statusText.innerText = "PROJECT SYNCED";
                    statusText.style.color = "";
                } else {
                    alert(data.error || "Generation failed");
                    statusText.innerText = "GENERATION FAILED";
                }
            } catch (err) { 
                alert(err.message); 
                statusText.innerText = "CONNECTION ERROR";
            } finally { 
                hideLoading(); 
            }
        }

        function toggleSidebar() {
            const layout = document.getElementById('notebook-layout');
            const icon = document.getElementById('toggle-icon');
            layout.classList.toggle('collapsed');
            sidebarCollapsed = !sidebarCollapsed;
            if (icon) {
                icon.className = sidebarCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left';
            }
        }

        // Load study scripts
    </script>
    <script src="js/app.js"></script>
    <script src="js/mindmap.js"></script>
    <script src="js/flashcards.js"></script>
    <script src="js/slides.js"></script>
    <script src="js/infographic.js"></script>
    <script src="js/quiz.js"></script>
    <script>
        window.onload = () => {
            setTheme(localStorage.getItem('neurolink-theme') || 'default');
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
            loadProject();
        };
    </script>
</body>
</html>
