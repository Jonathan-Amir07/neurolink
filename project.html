<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project View - Academic Skills System</title>
    <meta name="description" content="View and interact with AI-generated study materials including notebooks, mind maps, flashcards, slides, and infographics.">
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Permanent+Marker&family=Patrick+Hand&family=Indie+Flower&display=swap" rel="stylesheet">
    <!-- html2pdf.js for premium PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0;
            padding-bottom: 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #777;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .tab-btn:hover {
            background: rgba(0,0,0,0.05);
            color: var(--ink-color);
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 12px rgba(var(--accent-color-rgb), 0.3);
        }

        /* Notebook Divider Style Tabs */
        .tabs {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            flex-direction: column;
            gap: 0.5rem;
            z-index: 1000;
            background: transparent;
        }

        .tab-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--dot-color);
            border-right: none;
            border-radius: 12px 0 0 12px;
            padding: 0.8rem 1.2rem;
            text-align: right;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 0.85rem;
            width: 140px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
            box-shadow: -4px 4px 10px rgba(0,0,0,0.05);
        }

        .tab-btn:hover {
            width: 155px;
            background: var(--paper-bg);
            color: var(--accent-color);
        }

        .tab-btn.active {
            width: 160px;
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            box-shadow: -6px 6px 20px rgba(var(--accent-color-rgb), 0.4);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 0.5rem;
        }
        
        .breadcrumb a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .breadcrumb span {
            opacity: 0.5;
        }

        .viewer-container {
            min-height: 600px;
            position: relative;
        }

        .hidden { display: none !important; }

        #flashcard-view, #mindmap-view, #notebook-view, #slides-view, #infographic-view {
            width: 100%;
            height: 100%;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--dot-color);
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .header-right-btns {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .export-btn {
            background: none;
            border: 1px solid var(--line-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink-color);
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: var(--ink-color);
            color: white;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(249, 247, 241, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            border-radius: 16px;
        }

        .loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--dot-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 1rem;
            font-weight: 600;
            color: var(--ink-color);
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── MINDMAP (NOTEBOOK STYLE) ── */
        #mindmap-view {
            overflow: auto;
            position: relative;
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            scroll-behavior: smooth;
        }

        #tree-root {
            position: relative;
            min-width: 2000px;
            min-height: 1000px;
            padding: 100px;
        }

        .mindmap-svg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .mindmap-connection {
            fill: none;
            stroke: var(--ink-color);
            stroke-width: 2.5;
            stroke-linecap: round;
            opacity: 0.4;
            transition: all 0.4s ease;
        }

        .mindmap-node {
            position: absolute;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .mindmap-card {
            background-color: var(--paper-bg);
            padding: 1.2rem 1.5rem;
            color: var(--ink-color);
            font-family: 'Patrick Hand', cursive;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 180px;
            max-width: 280px;
            cursor: pointer;
            border-left: 5px solid var(--accent-color);
            position: relative;
            transition: all 0.2s ease;
        }

        .mindmap-card:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 20;
        }

        .mindmap-card.root {
            border-left: none;
            border-bottom: 5px solid var(--accent-color);
            text-align: center;
            font-size: 1.3rem;
            background: #fffdf6;
        }

        .mindmap-card h4 {
            font-family: 'Permanent Marker', cursive;
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
        }

        .mindmap-card p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        .node-toggle {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .mindmap-node.collapsed .node-toggle {
            transform: translateY(-50%) rotate(45deg);
        }


        .empty-state-card {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px dashed var(--line-color);
            margin-top: 2rem;
        }

        .empty-state-card h3 {
            margin-bottom: 0.5rem;
            color: var(--ink-color);
        }

        .empty-state-card p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 1024px) {
            .tabs {
                position: static;
                transform: none;
                flex-direction: row;
                margin-bottom: 2rem;
                justify-content: center;
                width: 100%;
            }
            .tab-btn {
                width: auto;
                border-radius: 8px;
                border: 1px solid var(--dot-color);
                padding: 0.5rem 0.8rem;
                text-align: center;
                box-shadow: none;
            }
            .tab-btn:hover, .tab-btn.active {
                width: auto;
                transform: none;
            }
        }

        /* ── CHATBOT UI ── */
        .chat-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 64px;
            height: 64px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(var(--accent-color-rgb), 0.4);
            z-index: 2000;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 4px solid white;
        }

        .chat-toggle:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .chat-window {
            position: fixed;
            bottom: 6.5rem;
            right: 2rem;
            width: 380px;
            height: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            z-index: 1500;
            overflow: hidden;
            transform-origin: bottom right;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            pointer-events: none;
        }

        .chat-window.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }

        .chat-header {
            padding: 1.2rem;
            background: var(--accent-color);
            color: white;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(255,255,255,0.05);
        }

        .message {
            max-width: 85%;
            padding: 0.8rem 1rem;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.ai {
            background: var(--paper-bg);
            color: var(--ink-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        .message.user {
            background: var(--accent-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .chat-input-area {
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid var(--dot-color);
        }

        .chat-input {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--dot-color);
            background: white;
            font-family: inherit;
        }

        .send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; flex-direction:column;">
            <div class="breadcrumb">
                <a href="/dashboard">My Workspace</a>
                <span>/</span>
                <span id="breadcrumb-project" style="color:var(--ink-color); font-weight:800; opacity:1;">Project</span>
            </div>
            <div style="font-weight: 800; font-size: 1.5rem;" id="project-title-header">Project</div>
        </div>
        <nav id="nav-links">
            <a href="/auth/logout" class="auth-btn">Logout</a>
        </nav>
    </header>

    <main class="container" style="position: relative;">
        <div class="header-controls">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('notebook')">📓 Notebook</button>
                <button class="tab-btn" onclick="switchTab('mindmap')">🗺️ Mind Map</button>
                <button class="tab-btn" onclick="switchTab('flashcards')">🃏 Flashcards</button>
                <button class="tab-btn" onclick="switchTab('slides')">📊 Slides</button>
                <button class="tab-btn" onclick="switchTab('infographic')">🖼️ Infographic</button>
                <button class="tab-btn" onclick="switchTab('quiz')">🎯 Quiz</button>
            </div>
            <div class="header-right-btns">
                <button class="export-btn" onclick="exportCurrentTab()" title="Download current material">⬇ Export</button>
                <button id="share-toggle-btn" class="export-btn" onclick="toggleSharing()" title="Toggle public access">🔗 Public: OFF</button>
                <button id="regen-btn" class="auth-btn" onclick="regenerateCurrentTab()" style="font-size: 0.85rem; padding: 0.4rem 0.8rem; background-color: var(--accent-color);">↺ Regenerate</button>
            </div>
        </div>

        <div class="viewer-container">
            <!-- Loading overlay (hidden by default) -->
            <div id="loading-overlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p id="loading-text">Generating with AI... 🧠</p>
            </div>

            <div id="notebook-view">
                 <div class="notebook-inner-layout">
                     <aside class="notebook-sidebar">
                         <h1 id="notebook-sidebar-title">STUDY NOTES</h1>
                         <nav id="notebook-toc"></nav>
                     </aside>
                     <main id="notebook-content-area" class="notebook-main">
                         <div class="empty-state-card">
                             <h3>Loading notebook...</h3>
                         </div>
                     </main>
                 </div>
            </div>
            
            <div id="mindmap-view" class="hidden">
                 <div id="tree-root"></div>
            </div>

            <div id="flashcards-view" class="hidden">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px;">
                    <div id="flashcard-container"></div>
                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button class="auth-btn" onclick="prevCard()">← Back</button>
                        <button class="auth-btn" id="flip-btn" onclick="flipCard()">Flip (Space)</button>
                        <button class="auth-btn" onclick="nextCard()">Next →</button>
                    </div>
                </div>
            </div>

            <div id="slides-view" class="hidden">
                <div id="slides-container"></div>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="auth-btn" onclick="prevSlide()">← Previous</button>
                    <button class="auth-btn" onclick="nextSlide()">Next →</button>
                </div>
            </div>

            <div id="infographic-view" class="hidden">
                <div id="infographic-container"></div>
            </div>

            <div id="quiz-view" class="hidden">
                <div id="quiz-container" class="quiz-container"></div>
            </div>
        </div>

        <!-- Chatbot UI -->
        <div id="chat-toggle" class="chat-toggle" onclick="toggleChat()">🤖</div>
        <div id="chat-window" class="chat-window">
            <div class="chat-header">
                <span>AI Study Mate</span>
                <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">×</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="message ai">Hi! I'm your NeuroLink Study Mate. Ask me anything about this project! 📚</div>
            </div>
            <form id="chat-form" class="chat-input-area">
                <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="send-btn">Send</button>
            </form>
        </div>

        <!-- Export Modal -->
        <div id="export-modal" class="chat-window" style="height: auto; min-height: 300px; bottom: 50%; right: 50%; transform: translate(50%, 50%) scale(0.8); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);">
            <div class="chat-header">
                <span>Export Material</span>
                <button onclick="closeExportModal()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">×</button>
            </div>
            <div style="padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem;">
                <p style="font-family: 'Patrick Hand', cursive; font-size: 1.2rem; color: var(--ink-color);">Choose your export format for <strong id="export-target-name">...</strong></p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <button class="auth-btn" onclick="executeExport('pdf')" style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1.5rem 1rem;">
                        <span style="font-size: 1.5rem;">📄</span>
                        <span>PDF Document</span>
                    </button>
                    <button class="auth-btn" onclick="executeExport('html')" style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1.5rem 1rem;">
                        <span style="font-size: 1.5rem;">🌐</span>
                        <span>Single HTML</span>
                    </button>
                </div>
                <div id="export-status" style="font-size: 0.85rem; text-align: center; color: var(--accent-color); font-weight: 700;"></div>
            </div>
        </div>
    </main>

    <script src="js/app.js?v=1.2"></script>
    <script src="js/mindmap.js"></script>
    <script src="js/flashcards.js"></script>
    <script src="js/slides.js"></script>
    <script src="js/infographic.js"></script>
    <script src="js/quiz.js?v=1.2"></script>
    <script src="js/chat.js"></script>
    <script>
        let currentProject = null;
        let activeTab = 'notebook';

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('project-title-header').innerText = 'No Project ID';
                return;
            }

            try {
                const res = await fetch(`/api/projects/${id}`);
                if (res.ok) {
                    currentProject = await res.json();
                    document.getElementById('project-title-header').innerText = currentProject.title || 'Untitled Project';
                    document.getElementById('breadcrumb-project').innerText = currentProject.title || 'Project';
                    document.title = `${currentProject.title || 'Project'} - NeuroLink`;
                    
                    // Update sharing button
                    updateShareButton(currentProject.is_public);
                    
                    // Load chat history
                    if (window.loadChatHistory) loadChatHistory(currentProject.chat_history);
                    
                    switchTab('notebook');
                } else {
                    document.getElementById('project-title-header').innerText = "Project Not Found (404)";
                    console.error("Failed to fetch project");
                }
            } catch (error) {
                console.error("Error fetching project:", error);
                document.getElementById('project-title-header').innerText = "Connection Error";
            }
        }

        function switchTab(type) {
            activeTab = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.tab-btn[onclick="switchTab('${type}')"]`);
            if (activeBtn) activeBtn.classList.add('active');

            const views = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic', 'quiz'];
            views.forEach(v => {
                document.getElementById(`${v}-view`).classList.add('hidden');
            });
            document.getElementById(`${type}-view`).classList.remove('hidden');
            
            // Critical: Use a clean rendering cycle
            setTimeout(() => {
                renderContent(type);
            }, 0);
        }

        function renderContent(type) {
            showLoading(`Loading ${type}... 🧠`);
            
            try {
                if (!currentProject) {
                    showEmptyState(type, 'Project data not loaded.', 'Please refresh the page.');
                    return;
                }

                const output = currentProject.outputs.find(o => o.type === type);
                if (!output || !output.content) {
                    showEmptyState(type, `No ${type} generated yet.`, 'There might have been a timeout or generation error.');
                    return;
                }

                // Normalizer: Handle JSON strings from legacy project storage
                const data = ensureJSON(output.content);
                
                if (type === 'notebook') {
                    renderNotebook(data);
                } else if (type === 'mindmap') {
                    initMindMap(data);
                } else if (type === 'flashcards') {
                    initFlashcards(data);
                } else if (type === 'slides') {
                    initSlides(data);
                } else if (type === 'infographic') {
                    initInfographic(data);
                } else if (type === 'quiz') {
                    initQuiz(data);
                }
            } catch (renderError) {
                console.error(`[Renderer Error] ${type}:`, renderError);
                showEmptyState(type, `Visualizer Error`, 'This project material might have been created with an older version of NeuroLink. Try Regenerating this tab.');
            } finally {
                hideLoading();
            }
        }

        function ensureJSON(data) {
            if (typeof data === 'string') {
                try {
                    // Only try parsing if it looks like JSON
                    if (data.trim().startsWith('{') || data.trim().startsWith('[')) {
                        return JSON.parse(data);
                    }
                } catch (e) {
                    console.warn('[SafeParse] Falling back to raw string');
                }
            }
            return data;
        }

        function showEmptyState(type, title, subtitle) {
            if (type === 'notebook') {
                document.getElementById('notebook-content-area').innerHTML = `
                    <div class="empty-state-card">
                        <h3>${title}</h3>
                        <p>${subtitle}</p>
                        <button class="auth-btn" style="background-color: var(--accent-color);" onclick="regenerateCurrentTab()">✨ Generate Now</button>
                    </div>
                `;
                document.getElementById('notebook-toc').innerHTML = '';
            } else {
                const containerId = {
                    mindmap: 'tree-root',
                    flashcards: 'flashcard-container',
                    slides: 'slides-container',
                    infographic: 'infographic-container',
                    quiz: 'quiz-container'
                }[type];
                const el = document.getElementById(containerId);
                if (el) {
                    el.innerHTML = `
                        <div class="empty-state-card">
                            <h3>${title}</h3>
                            <p>${subtitle}</p>
                            <button class="auth-btn" style="background-color: var(--accent-color);" onclick="regenerateCurrentTab()">✨ Generate Now</button>
                        </div>
                    `;
                }
            }
        }

        function renderNotebook(content) {
            const contentArea = document.getElementById('notebook-content-area');
            const toc = document.getElementById('notebook-toc');
            const sidebarTitle = document.getElementById('notebook-sidebar-title');
            
            if (!contentArea || !toc) return;
            
            sidebarTitle.innerText = (currentProject.title || 'STUDY NOTES').toUpperCase();
            contentArea.innerHTML = content;
            toc.innerHTML = '';

            const chapters = contentArea.querySelectorAll('section.notebook-page');
            
            chapters.forEach((chapter, index) => {
                const chTitleEl = chapter.querySelector('h2');
                if (!chTitleEl) return;

                const chId = `chapter-${index}`;
                chapter.id = chId;

                const group = document.createElement('div');
                group.className = 'toc-group';

                const groupTitle = document.createElement('div');
                groupTitle.className = 'toc-title';
                groupTitle.innerText = chTitleEl.innerText;
                group.appendChild(groupTitle);

                const subSections = chapter.querySelectorAll('div.notebook-section');
                subSections.forEach((sub, subIdx) => {
                    const subTitleEl = sub.querySelector('h3');
                    if (!subTitleEl) return;

                    const subId = `${chId}-sub-${subIdx}`;
                    sub.id = subId;

                    const link = document.createElement('a');
                    link.className = 'toc-link';
                    link.innerText = subTitleEl.innerText;
                    link.onclick = (e) => {
                        e.preventDefault();
                        document.getElementById(subId).scrollIntoView({ behavior: 'smooth' });
                        document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
                        link.classList.add('active');
                    };
                    group.appendChild(link);
                });

                toc.appendChild(group);
            });

            // If no chapters found, AI might have returned flat HTML — still display it
            if (chapters.length === 0 && content.trim()) {
                const group = document.createElement('div');
                group.className = 'toc-group';
                const groupTitle = document.createElement('div');
                groupTitle.className = 'toc-title';
                groupTitle.innerText = 'Content';
                group.appendChild(groupTitle);
                toc.appendChild(group);
            }
        }

        function showLoading(text) {
            const overlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            if (overlay) {
                loadingText.innerText = text || 'Generating with AI... 🧠';
                overlay.classList.remove('hidden');
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
        }

        async function regenerateCurrentTab() {
            if (!currentProject) return;

            const btn = document.getElementById('regen-btn');
            const originalText = btn.innerText;
            btn.innerText = 'Generating... ⏳';
            btn.disabled = true;
            showLoading(`Regenerating ${activeTab}... 🧠`);

            try {
                const res = await fetch(`/api/projects/${currentProject._id}/regenerate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: activeTab })
                });

                if (res.ok) {
                    const data = await res.json();
                    currentProject = data.project;
                    renderContent(activeTab);
                } else {
                    const err = await res.json().catch(()=>({}));
                    alert(err.error || 'Regeneration failed');
                }
            } catch (error) {
                alert('Connection error. Is the server running?');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                hideLoading();
            }
        }

        function exportCurrentTab() {
            if (!currentProject) return;
            document.getElementById('export-target-name').innerText = activeTab.toUpperCase();
            const modal = document.getElementById('export-modal');
            modal.style.opacity = '1';
            modal.style.pointerEvents = 'all';
            modal.style.transform = 'translate(50%, 50%) scale(1)';
        }

        function closeExportModal() {
            const modal = document.getElementById('export-modal');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
            modal.style.transform = 'translate(50%, 50%) scale(0.8)';
            document.getElementById('export-status').innerText = '';
        }

        async function executeExport(format) {
            const status = document.getElementById('export-status');
            status.innerText = `Preparing your ${format.toUpperCase()}... ⏳`;
            
            const output = currentProject.outputs.find(o => o.type === activeTab);
            if (!output || !output.content) {
                status.innerText = 'Error: No content found.';
                return;
            }

            const fileName = `${currentProject.title}_${activeTab}`;

            if (format === 'html') {
                const title = `${currentProject.title} - ${activeTab.charAt(0).toUpperCase() + activeTab.slice(1)}`;
                let template = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Indie+Flower&family=Permanent+Marker&display=swap" rel="stylesheet"><style>body{font-family:'Patrick Hand',cursive;max-width:900px;margin:2rem auto;padding:0 1rem;color:#2c3e50;background-color:#f4ead5;background-image:radial-gradient(rgba(0,0,0,0.05) 1.5px,transparent 1.5px);background-size:25px 25px;}.page{background:#fff;padding:40px;margin-bottom:2rem;box-shadow:0 4px 15px rgba(0,0,0,0.1);border-radius:8px;}h2{font-family:'Permanent Marker',cursive;color:#003366;border-bottom:4px double #003366;}h3{color:#b22222;border-left:6px solid #b22222;padding-left:15px;}</style></head><body><div class="page"><h1>${title}</h1>${output.content}</div></body></html>`;
                
                // Special handling for flashcards/slides
                if (activeTab === 'flashcards' || activeTab === 'slides') {
                    const items = activeTab === 'flashcards' 
                        ? output.content.map(c => `<div style="border:1px solid #ddd;padding:1rem;margin:1rem 0;border-radius:8px;"><strong>Q: ${c.question}</strong><p>A: ${c.answer}</p></div>`).join('')
                        : output.content.map(s => `<div style="border:1px solid #ddd;padding:1rem;margin:1rem 0;border-radius:8px;"><h2>${s.title}</h2><ul>${s.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div>`).join('');
                    template = template.replace(output.content, items);
                }

                const blob = new Blob([template], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fileName}.html`;
                a.click();
                status.innerText = 'Export complete! 🎉';
                setTimeout(closeExportModal, 1500);
            } else if (format === 'pdf') {
                // Determine target element for PDF
                let element = null;
                if (activeTab === 'notebook') element = document.getElementById('notebook-content-area');
                else if (activeTab === 'mindmap') element = document.getElementById('tree-root');
                else if (activeTab === 'flashcards') element = document.getElementById('flashcard-container');
                else if (activeTab === 'slides') element = document.getElementById('slides-container');
                else if (activeTab === 'infographic') element = document.getElementById('infographic-container');
                else if (activeTab === 'quiz') element = document.getElementById('quiz-container');

                if (!element) {
                    status.innerText = 'Error: Target not found.';
                    return;
                }

                const opt = {
                    margin:       1,
                    filename:     `${fileName}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    status.innerText = 'Export complete! 🎉';
                    setTimeout(closeExportModal, 1500);
                }).catch(err => {
                    status.innerText = 'PDF Export failed.';
                    console.error(err);
                });
            }
        }

        function updateShareButton(isPublic) {
            const btn = document.getElementById('share-toggle-btn');
            if (!btn) return;
            btn.innerText = isPublic ? '🔗 Public: ON' : '🔗 Public: OFF';
            btn.style.color = isPublic ? 'var(--mindmap-accent)' : 'var(--ink-color)';
            btn.style.borderColor = isPublic ? 'var(--mindmap-accent)' : 'var(--line-color)';
            if (isPublic) btn.title = "Public access is ON. Click to copy share link.";
        }

        async function toggleSharing() {
            if (!currentProject) return;
            
            const nextState = !currentProject.is_public;
            
            try {
                const res = await fetch(`/api/projects/${currentProject._id}/share`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_public: nextState })
                });

                if (res.ok) {
                    const data = await res.json();
                    currentProject.is_public = data.is_public;
                    updateShareButton(currentProject.is_public);
                    
                    if (currentProject.is_public) {
                        const shareUrl = `${window.location.origin}/share.html?id=${currentProject._id}`;
                        navigator.clipboard.writeText(shareUrl);
                        alert(`Project is now PUBLIC!\nShare Link copied to clipboard:\n${shareUrl}`);
                    } else {
                        alert('Project is now PRIVATE.');
                    }
                }
            } catch (error) {
                alert('Failed to update sharing status.');
            }
        }
            } else if (activeTab === 'slides') {
                const slides = output.content.map((s, i) => `<div style="border:1px solid #ddd;padding:2rem;margin:2rem 0;border-radius:8px;border-left:6px solid #e67e22;"><h2>${s.title}</h2><ul>${s.bullets.map(b=>`<li>${b}</li>`).join('')}</ul><small>Slide ${i+1}</small></div>`).join('');
                htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title></head><body style="font-family:sans-serif;max-width:800px;margin:2rem auto;"><h1>${title}</h1>${slides}</body></html>`;
            } else if (activeTab === 'infographic') {
                const sections = output.content.map(s => `<div style="padding:2rem;margin:2rem 0;background:#fffdf6;box-shadow:0 4px 10px rgba(0,0,0,0.1);"><h2>${s.icon || '📌'} ${s.title}</h2><p>${s.content}</p></div>`).join('');
                htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title></head><body style="font-family:sans-serif;max-width:800px;margin:2rem auto;"><h1>${title}</h1>${sections}</body></html>`;
            } else if (activeTab === 'mindmap') {
                htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title></head><body style="font-family:sans-serif;max-width:800px;margin:2rem auto;"><h1>${title}</h1><pre>${JSON.stringify(output.content, null, 2)}</pre></body></html>`;
            }

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentProject.title.replace(/[^a-z0-9]/gi, '_')}_${activeTab}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }

        init();
    </script>
</body>
</html>
