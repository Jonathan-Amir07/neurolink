<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLink - Study Project</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Patrick+Hand&family=Permanent+Marker&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="paper-texture">
    <header>
        <div class="breadcrumb">
            <a href="dashboard.html" class="brand" style="font-weight: 800; font-size: 1.25rem; color: var(--accent-color); text-decoration: none; letter-spacing: -0.5px;">NeuroLink</a>
            <span class="sep">/</span>
            <span class="current" id="breadcrumb-project" style="font-weight: 400; opacity: 0.6;">Project Studio</span>
        </div>
        
        <nav id="nav-links">
            <div id="gen-progress" style="background:var(--accent-color); height:2px; width:0%; position:absolute; top:0; left:0; transition:width 1s; box-shadow: 0 0 10px var(--accent-color);"></div>
            <!-- PROJECT PULSE HUD (Luxury Redesign) -->
            <div class="action-capsule">
                <div class="hud-item" style="padding: 0 12px; border-right: 1px solid rgba(255,255,255,0.1);">
                    <div class="ai-pulse-indicator"></div>
                    <span id="ai-status-text" style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Live</span>
                </div>
                <button class="action-btn" id="regen-btn" onclick="regenerateCurrentTab()" title="Regenerate Content">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="action-btn active-primary" onclick="exportProject()" title="Export Workspace">
                    <i class="fas fa-file-export"></i> <span>Export</span>
                </button>
            </div>

            <div class="user-menu" style="gap: 1.5rem;">
                <div class="theme-selector-pill">
                    <button onclick="setTheme('parchment')" title="Parchment Mode" class="theme-pill-btn parchment-btn">📜</button>
                    <button onclick="setTheme('library')" title="Midnight Library" class="theme-pill-btn library-btn">🌙</button>
                    <button onclick="setTheme('lab')" title="Sterile Lab" class="theme-pill-btn lab-btn">🧪</button>
                    <button onclick="setTheme('default')" title="Standard Studio" class="theme-pill-btn studio-btn">🏢</button>
                </div>
                <a href="/auth/logout" style="font-size: 0.75rem; font-weight: 700; color: white; opacity: 0.4; text-decoration: none; text-transform: uppercase; letter-spacing: 1px;">Sign Out</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- SEGMENTED WORKSPACE NAV (Redesigned) -->
        <div class="workspace-tabs">
            <button class="nav-pill tab-notebook active" onclick="switchTab('notebook')"><i class="fas fa-book-open"></i> Notebook</button>
            <button class="nav-pill tab-mindmap" onclick="switchTab('mindmap')"><i class="fas fa-project-diagram"></i> Mind Map</button>
            <button class="nav-pill tab-flashcards" onclick="switchTab('flashcards')"><i class="fas fa-layer-group"></i> Flashcards</button>
            <button class="nav-pill tab-slides" onclick="switchTab('slides')"><i class="fas fa-presentation-screen"></i> Slides</button>
            <button class="nav-pill tab-infographic" onclick="switchTab('infographic')"><i class="fas fa-chart-line"></i> Analytics</button>
            <button class="nav-pill tab-quiz" onclick="switchTab('quiz')"><i class="fas fa-vial"></i> Quiz</button>
        </div>

        <div class="binder-frame premium-shadow" id="binder-frame">
            <!-- BINDER RINGS -->
            <div class="binder-rings">
                <div class="ring"></div><div class="ring"></div><div class="ring"></div>
                <div class="ring"></div><div class="ring"></div><div class="ring"></div>
            </div>

            <div class="viewer-container">
                <div id="loading-overlay" class="loading-overlay hidden">
                    <div class="spinner"></div>
                    <p id="loading-text">SYNCING...</p>
                </div>

                <div id="notebook-view">
                    <div class="notebook-inner-layout" id="notebook-layout">
                        <aside class="notebook-sidebar">
                            <div class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Focus Mode">
                                <i class="fas fa-chevron-left" id="toggle-icon"></i>
                            </div>
                            <h1>STUDY INDEX</h1>
                            <nav id="notebook-toc"></nav>
                        </aside>
                        <main id="notebook-content-area" class="notebook-main">
                            <!-- Content -->
                        </main>
                    </div>
                </div>

                <div id="mindmap-view" class="hidden"><div id="tree-root"></div></div>
                <div id="flashcards-view" class="hidden">
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:500px;">
                        <div id="flashcard-container"></div>
                        <div style="margin-top:2rem; display:flex; gap:1rem;">
                            <button class="auth-btn" onclick="prevCard()">← Back</button>
                            <button class="auth-btn" id="flip-btn" onclick="flipCard()">Flip</button>
                            <button class="auth-btn" onclick="nextCard()">Next →</button>
                        </div>
                    </div>
                </div>
                <div id="slides-view" class="hidden"><div id="slides-container"></div></div>
                <div id="infographic-view" class="hidden"><div id="infographic-container"></div></div>
                <div id="quiz-view" class="hidden"><div id="quiz-container"></div></div>
            </div>
        </div>
    </main>

    <script>
        let currentProject = null;
        let activeTab = 'notebook';
        let sidebarCollapsed = false;

        async function loadProject() {
            showLoading("ACCESING ARCHIVES...");
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            if (!projectId) { window.location.href = 'dashboard.html'; return; }

            try {
                const res = await fetch(`/api/projects?id=${projectId}`);
                const data = await res.json();
                if (data.success && data.project) {
                    currentProject = data.project;
                    document.getElementById('ai-status-text').innerText = "Project Synced";
                    
                    const priority = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic', 'quiz'];
                    const hasMaterial = (type) => {
                        if (!currentProject.outputs) return !!currentProject[type];
                        const o = currentProject.outputs.find(out => out.type === type);
                        return (o && o.content && o.content.length > 5);
                    };

                    const count = priority.filter(hasMaterial).length;
                    document.getElementById('gen-progress').style.width = `${(count / 6) * 100}%`;

                    switchTab(priority.find(hasMaterial) || 'notebook');
                    hideLoading();
                }
            } catch (error) { console.error(error); hideLoading(); }
        }

        function switchTab(type) {
            activeTab = type;
            document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.tab-${type}`);
            if (activeBtn) activeBtn.classList.add('active');

            const views = ['notebook', 'mindmap', 'flashcards', 'slides', 'infographic', 'quiz'];
            views.forEach(v => document.getElementById(`${v}-view`).classList.add('hidden'));
            document.getElementById(`${type}-view`).classList.remove('hidden');
            
            renderContent(type);
        }

        function toggleSidebar() {
            sidebarCollapsed = !sidebarCollapsed;
            const layout = document.getElementById('notebook-layout');
            const icon = document.getElementById('toggle-icon');
            if (sidebarCollapsed) {
                layout.classList.add('collapsed');
                icon.className = 'fas fa-chevron-right';
            } else {
                layout.classList.remove('collapsed');
                icon.className = 'fas fa-chevron-left';
            }
        }

        function renderContent(type) {
            if (!currentProject) return;
            const output = currentProject.outputs && currentProject.outputs.find(o => o.type === type);
            const content = (output && output.content) || currentProject[type];
            
            if (!content || content.length < 5) { showEmptyState(type); return; }

            if (type === 'notebook') renderNotebook(content);
            else {
                const data = ensureJSON(content);
                if (type === 'mindmap' && window.initMindMap) initMindMap(data);
                else if (type === 'flashcards' && window.initFlashcards) initFlashcards(data);
                else if (type === 'slides' && window.initSlides) initSlides(data);
                else if (type === 'infographic' && window.initInfographic) initInfographic(data);
                else if (type === 'quiz' && window.initQuiz) initQuiz(data);
            }
        }

        function renderNotebook(content) {
            const area = document.getElementById('notebook-content-area');
            const toc = document.getElementById('notebook-toc');
            area.innerHTML = content;
            toc.innerHTML = '';
            
            area.querySelectorAll('h2').forEach((h2, i) => {
                const id = `ch-${i}`; h2.id = id;
                const group = document.createElement('div');
                group.className = 'toc-group';
                group.innerHTML = `<span class="toc-title">${h2.innerText}</span>`;
                
                let next = h2.nextElementSibling;
                while(next && next.tagName !== 'H2') {
                    if (next.tagName === 'H3') {
                        const subId = `s-${Math.random().toString(36).substr(2,5)}`;
                        next.id = subId;
                        const link = document.createElement('a');
                        link.className = 'toc-link';
                        link.innerText = next.innerText;
                        link.onclick = (e) => {
                            e.preventDefault();
                            document.getElementById(subId).scrollIntoView({ behavior: 'smooth' });
                        };
                        group.appendChild(link);
                    }
                    next = next.nextElementSibling;
                }
                toc.appendChild(group);
            });
        }

        function ensureJSON(data) {
            if (typeof data === 'object') return data;
            try { return JSON.parse(data); } catch (e) {
                const match = data.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
                return match ? JSON.parse(match[1]) : data;
            }
        }

        function showEmptyState(type) {
            const containerId = type === 'notebook' ? 'notebook-content-area' : {
                mindmap: 'tree-root', flashcards: 'flashcard-container',
                slides: 'slides-container', infographic: 'infographic-container',
                quiz: 'quiz-container'
            }[type];
            const el = document.getElementById(containerId);
            if (el) el.innerHTML = `<div class="empty-state-card" style="padding:4rem; text-align:center;">
                <h3 style="font-family:'Permanent Marker'; font-size:2rem; color:var(--accent-color);">Missing Material</h3>
                <p>AI can generate this ${type} for you in seconds.</p>
                <button class="auth-btn" style="margin-top:2rem; background:var(--accent-color); padding:1rem 2rem;" onclick="regenerateCurrentTab()">Generate Now</button>
            </div>`;
        }

        function showLoading(text) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').innerText = text;
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        function setTheme(theme) {
            if (theme === 'default') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('artisan-theme', theme);
            document.querySelectorAll('.theme-pill-btn').forEach(btn => btn.classList.remove('active-parchment', 'active-library', 'active-lab', 'active-default'));
            const activeBtn = document.querySelector(`.${theme === 'parchment' ? 'parchment-btn' : theme === 'library' ? 'library-btn' : theme === 'lab' ? 'lab-btn' : 'studio-btn'}`);
            if (activeBtn) activeBtn.classList.add(`active-${theme}`);
        }

        async function regenerateCurrentTab() {
            if (!confirm(`Regenerate ${activeTab}?`)) return;
            showLoading("AI IS CREATING...");
            try {
                const res = await fetch('/api/generate-project', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectId: currentProject._id, types: [activeTab], force: true })
                });
                const data = await res.json();
                if (data.success) loadProject();
            } catch (err) { alert(err.message); } finally { hideLoading(); }
        }

        window.onload = () => {
            setTheme(localStorage.getItem('artisan-theme') || 'default');
            loadProject();
        };
    </script>
</body>
</html>
