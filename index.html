<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Skills System (ASS)</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title {
            font-family: 'Permanent Marker', cursive;
            font-size: 5rem;
            color: var(--ink-color);
            transform: rotate(-2deg);
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #555;
        }

        .cta-container {
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; font-size: 1.5rem;">A.S.S.</div>
        <nav id="nav-links">
            <a href="/auth/google" class="auth-btn">Login with Google</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1 class="title">Academic Pipeline AI</h1>
            <p class="subtitle">Transform your lectures into Notebooks, Mind Maps, and Flashcards instantly.</p>
            <div class="cta-container">
                <a href="/auth/google" class="auth-btn" style="font-size: 1.2rem; padding: 1rem 2rem;">Get Started for Free</a>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
